# CI/CD for the e-MC platform (platform/ directory).
# PRs: typecheck + unit tests + builds. main: additionally build & push images.
name: emc-platform-ci

on:
  push:
    branches: [main]
    paths: ['platform/**', '.github/workflows/emc-platform-ci.yml']
  pull_request:
    paths: ['platform/**']

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: platform/api }
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emc
          POSTGRES_PASSWORD: emc
          POSTGRES_DB: emc_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U emc" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://emc:emc@localhost:5432/emc_test?schema=public
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: platform/api/package-lock.json }
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
      - name: Dependency vulnerability gate
        run: npm audit --omit=dev --audit-level=high

  web:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: platform/web }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: platform/web/package-lock.json }
      - run: npm ci
      - run: npm run build
      - name: Dependency vulnerability gate
        run: npm audit --omit=dev --audit-level=high

  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [api, web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: platform/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/emc-api:latest
            ghcr.io/${{ github.repository_owner }}/emc-api:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: platform/web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/emc-web:latest
            ghcr.io/${{ github.repository_owner }}/emc-web:${{ github.sha }}

  # Deployment to EKS is gated on an environment approval in GitHub.
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      - name: Deploy to EKS
        run: |
          echo "aws eks update-kubeconfig --name emc-cluster --region ap-southeast-5"
          echo "kubectl -n emc set image deployment/emc-api api=ghcr.io/${{ github.repository_owner }}/emc-api:${{ github.sha }}"
          echo "kubectl -n emc set image deployment/emc-web web=ghcr.io/${{ github.repository_owner }}/emc-web:${{ github.sha }}"
          echo "(dry-run placeholders — wire AWS credentials via OIDC before enabling)"
